apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zanzipay
  namespace: zanzipay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zanzipay
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
